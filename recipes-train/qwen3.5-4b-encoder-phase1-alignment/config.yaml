# Qwen3.5-4B-Base + ChessEncoder — Phase 1: Alignment (projector + LoRA + trunk)
#
# Goal:   Align cnn.proj + cnn.global_proj into LLM embedding space.
#         CNN trunk from encoder-clip (CLIP-trained at 3e-4, semantically aligned to Qwen).
#         Flat 65-token sentinel block — no square-label text anchors.
#
# Frozen: LLM base weights only
# Trained: cnn.proj + cnn.global_proj (~14M) at 5e-4 (random init, high LR)
#          LoRA r=64 (~113M) at 1e-4
#          CNN trunk (~3M) at 5e-5 (pretrained, low LR — preserve CLIP features)
#          LoRA covers: full-attention (q/k/v/o_proj), MLP (gate/up/down_proj),
#          AND DeltaNet recurrent (in_proj_a/b/qkv/z, out_proj) — 32 layers total
#
# Base model — projector and LoRA trained from scratch (no instruct tuning).
# Prompt: system prompt + 65 sentinel tokens + question (position randomized 50/50)
# Data:   LLaVA-style board description — 5.27M records (easy+medium combined)
# DDP:    2× RTX 5090  |  effective batch = 128 (8 × 2 GPUs × 8 accum)

model:
  model_name: "Qwen/Qwen3.5-4B-Base"
  attn_implementation: "sdpa"

encoder:
  in_channels: 19
  hidden_size: 256
  num_blocks: 10
  pretrained_weights: "checkpoints/encoder-clip/checkpoint-9000/encoder_weights.pt"

lora:
  r: 64
  alpha: 128
  dropout: 0.0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
    # DeltaNet recurrent projections (24/32 layers are GatedDeltaNet)
    - in_proj_a
    - in_proj_b
    - in_proj_qkv
    - in_proj_z
    - out_proj
  bias: none

training:
  train_file: data/processed/alignment_board_description_combined.jsonl
  eval_file:  data/processed/alignment_board_description_combined_eval.jsonl
  max_seq_length: 256  # no system prompt: p99=147, max=196 pre-expansion (100k sample); post-expansion ceiling=319 (+64); 60-token headroom for unseen outliers

  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 8  # effective batch = 128 (8 × 2 GPUs × 8 accum)

  learning_rate: 5.0e-4           # proj/global_proj LR — random init, LLaVA-1.5 alignment rate
  lora_learning_rate: 1.0e-4     # LoRA LR — community consensus for r=64 alignment
  cnn_trunk_learning_rate: 5.0e-5  # CNN trunk LR — pretrained at 3e-4, fine-tune at ~6x lower
  lr_scheduler_type: cosine
  warmup_steps: 200            # extended warmup for stable ramp with lm_head frozen
  num_train_epochs: 1
  max_steps: 41149  # 1 epoch over combined easy+medium dataset (5.27M records, effective_batch=128)

  optim: adamw_torch  # overridden by create_optimizer (two param groups)
  weight_decay: 0.05
  max_grad_norm: 1.0

  gradient_checkpointing: false
  bf16: true
  dataloader_num_workers: 8
  ddp_find_unused_parameters: false
  dispatch_batches: false  # each GPU fetches its own batch from sharded IterableDataset

  logging_steps: 10
  eval_strategy: steps
  eval_steps: 200
  save_strategy: steps
  save_steps: 500
  save_total_limit: 20

  seed: 42

output_dir: checkpoints/qwen3.5-4b-base-encoder-phase1-alignment

wandb:
  enabled: false
  project: "chess-tutor"
  name: "qwen3.5-4b-base-encoder-phase1-alignment"
  tags: ["encoder", "alignment", "projector", "base"]
