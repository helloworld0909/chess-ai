# Qwen3.5-4B + ChessEncoder — Phase 1: Alignment (medium dataset)
#
# Goal:   Align cnn.proj + cnn.global_proj into LLM embedding space.
#         CNN trunk from encoder-clip (CLIP-trained, semantically aligned to Qwen).
#         Flat 65-token sentinel block — no square-label text anchors.
#
# Frozen: CNN trunk + LLM base weights
# Trained: cnn.proj + cnn.global_proj (~14M) + LoRA r=64 (~85M, at 5e-5 LR)
#
# Prompt: system prompt + 65 sentinel tokens + question (position randomized 50/50)
# Data:   Medium dataset — 30 tasks (20 easy + 10 medium), 1.16M train examples
# DDP:    2× RTX 5090  |  effective batch = 128 (8 × 2 GPUs × 8 accum)

model:
  model_name: "Qwen/Qwen3.5-4B"
  attn_implementation: "sdpa"

encoder:
  in_channels: 19
  hidden_size: 256
  num_blocks: 10
  pretrained_weights: "checkpoints/encoder-clip/checkpoint-9000/encoder_weights.pt"

lora:
  r: 64
  alpha: 128
  dropout: 0.0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: none

training:
  train_file: data/processed/alignment_board_description_medium.jsonl
  eval_file:  data/processed/alignment_board_description_medium_eval.jsonl
  max_seq_length: 300  # medium dataset (full sequence): p99=246, max=258

  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 8  # effective batch = 128 (8 × 2 GPUs × 8 accum)

  learning_rate: 5.0e-5        # proj/global_proj LR — pretrained from CLIP, fine-tuning rate
  lora_learning_rate: 5.0e-5  # LoRA LR — needs strong signal for alignment
  lr_scheduler_type: cosine
  warmup_steps: 200            # extended warmup for stable ramp with lm_head frozen
  num_train_epochs: 1
  max_steps: 9070  # overrides epochs; Trainer stops at this step regardless — resume continues from last step

  optim: adamw_torch  # overridden by create_optimizer (two param groups)
  weight_decay: 0.05
  max_grad_norm: 1.0

  gradient_checkpointing: false
  bf16: true
  dataloader_num_workers: 8
  ddp_find_unused_parameters: false
  dispatch_batches: false  # each GPU fetches its own batch from sharded IterableDataset

  logging_steps: 10
  eval_strategy: steps
  eval_steps: 200
  save_strategy: steps
  save_steps: 500
  save_total_limit: 20

  seed: 42

output_dir: checkpoints/qwen3.5-4b-encoder-phase1-alignment-medium

wandb:
  enabled: false
  project: "chess-tutor"
  name: "qwen3.5-4b-encoder-phase1-alignment-medium"
  tags: ["encoder", "alignment", "projector", "medium"]
