# GRPO Phase 1 — Board-reading pretraining
#
# Verifiable tasks: piece_at, in_check, count_pieces, piece_count_by_type, attacked_by, material_count
# Rule-based reward (no LLM judge) — both GPUs.
# Short completions: think block + <answer>...</answer> ~300-800 tokens max.

model:
  model_name: "Qwen/Qwen3.5-4B"
  torch_dtype: bfloat16

lora:
  r: 64
  alpha: 128
  dropout: 0.0
  target_modules:
    # LLM attention + MLP
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
    # Visual encoder attention + MLP
    - qkv
    - linear_fc1
    - linear_fc2
  bias: none

training:
  train_file: data/processed/grpo_phase1c_board_reading.jsonl
  eval_file:  data/processed/grpo_phase1c_board_reading_eval.jsonl

  # Curriculum phase 1c: all 6 basic tasks, randomly mixed
  task_filter: ["piece_at", "in_check", "count_pieces", "piece_count_by_type", "attacked_by", "material_count"]

  num_generations: 4
  max_completion_length: 1024

  # Effective batch = per_device_train_batch_size × gradient_accumulation_steps × num_generations × num_gpus
  # = 8 × 1 × 4 × 2 = 64 completions/optimizer step (num_generations dropped 8→4 for faster steps)
  # Eval has no backward — can be much larger than train batch
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 32
  gradient_accumulation_steps: 1
  dataloader_num_workers: 2

  learning_rate: 1.0e-5
  lr_scheduler_type: cosine
  warmup_steps: 50
  num_train_epochs: 1
  optim: adamw_torch_fused
  weight_decay: 0.01
  max_grad_norm: 0.1

  beta: 0.01    # KL penalty from base model (prevents entropy collapse); PEFT = no second model copy
  epsilon: 0.2

  # Linear length penalty on completion word count
  len_penalty_free_tokens: 100   # no penalty up to this many words
  len_penalty_max: 0.5           # max penalty at max_completion_length

  temperature: 1.0
  top_p: 0.95
  repetition_penalty: 1.1

  bf16: true
  seed: 42

  logging_steps: 1
  eval_strategy: steps
  eval_steps: 100
  save_strategy: steps
  save_steps: 20
  save_total_limit: 10

output_dir: checkpoints/qwen3.5-4b-grpo-phase1

wandb:
  enabled: false
  project: chess-tutor-grpo
  name: qwen3.5-4b-grpo-phase1
  tags:
    - grpo
    - phase1
    - board-reading
    - rule-based-reward
