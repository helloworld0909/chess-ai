# GRPO Phase 1 — Qwen3.5-4B + LoRA + LLM Judge reward
#
# Vanilla Qwen3.5-4B (no encoder). Goal: verify the GRPO + judge reward loop works
# before adding the chess encoder on top.
#
# Reward: GCC-Eval judge (Qwen3.5-35B-A3B-GPTQ-Int4 on GPU 1, port 8400)
# Single GPU training (GPU 0) — GPU 1 reserved for judge

model:
  model_name: "Qwen/Qwen3.5-4B"
  attn_implementation: "sdpa"
  torch_dtype: bfloat16

lora:
  r: 64
  alpha: 128
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: none

training:
  train_file: data/processed/grpo_phase1_prompts.jsonl
  eval_file:  data/processed/grpo_phase1_prompts_eval.jsonl

  num_generations: 16
  max_completion_length: 16000

  # generation_batch_size = per_device_train_batch_size x steps_per_generation
  # prompts_per_generation_call = generation_batch_size // num_generations
  # 4 x 8 = 32 → 32 // 16 = 2 prompts generated together each step
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 16
  gradient_accumulation_steps: 16
  steps_per_generation: 8
  dataloader_num_workers: 2

  learning_rate: 3.0e-6
  lr_scheduler_type: cosine
  warmup_steps: 5
  num_train_epochs: 1
  optim: adamw_torch
  weight_decay: 0.01
  max_grad_norm: 0.1

  beta: 0.0     # pure REINFORCE — no reference model
  epsilon: 0.2

  use_vllm: false
  vllm_mode: colocate
  vllm_gpu_memory_utilization: 0.3

  temperature: 1.0
  top_p: 0.95

  bf16: true
  gradient_checkpointing: true
  torch_empty_cache_steps: 1
  seed: 42

  logging_steps: 1
  eval_strategy: steps
  eval_steps: 100
  save_strategy: steps
  save_steps: 10
  save_total_limit: 10

  judge_server_url: "http://localhost:8400"
  judge_model: "Qwen/Qwen3.5-35B-A3B-GPTQ-Int4"
  judge_timeout: 300.0

output_dir: checkpoints/qwen3.5-4b-grpo-phase1

wandb:
  enabled: false
  project: chess-tutor-grpo
  name: qwen3.5-4b-grpo-phase1
  tags:
    - grpo
    - phase1
    - llm-judge
    - no-encoder
