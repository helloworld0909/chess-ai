# GRPO Phase 2 — ChessLMWithEncoder (CNN frozen + LoRA on LLM)
# Same architecture and prompt format as Phase 1 SFT.
# CNN board encoder is frozen; LoRA adapters on Qwen3.5-4B are trainable.
# Rewards: Stockfish legality/eval + structural annotation + coaching quality.
# Dataset: grpo_joint_prompts.jsonl — 14k unseen Lichess positions from lines_30k,
#          formatted as lines_joint_sft prompts (JOINT_SYSTEM_PROMPT + Engine Key Lines).

model:
  model_name: "checkpoints/qwen3.5-4b-encoder-phase1-sft/checkpoint-890"
  attn_implementation: "sdpa"
  torch_dtype: bfloat16

encoder:
  hidden_size: 512
  num_blocks: 15
  pretrained_weights: "checkpoints/encoder-pretrain/checkpoint-580083/encoder_weights.pt"

lora:
  r: 64
  alpha: 128
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: none

training:
  train_file: data/processed/grpo_joint_prompts_sf15.jsonl
  eval_file:  data/processed/grpo_joint_prompts_sf15_eval50.jsonl  # 50 samples — fast eval

  num_generations: 4
  max_prompt_length: 2000    # joint prompts are longer (have Engine Key Lines)
  max_completion_length: 1500
  stockfish_depth: 12

  # TRL constraint: per_device x world_size x grad_accum divisible by num_generations
  # 2 x 2 x 4 = 16, 16 % 4 == 0
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  dataloader_num_workers: 4
  ddp_find_unused_parameters: false  # CNN is frozen, no unused params in backward

  learning_rate: 5.0e-6
  lr_scheduler_type: cosine
  warmup_steps: 10
  num_train_epochs: 1
  optim: adamw_torch
  weight_decay: 0.01
  max_grad_norm: 0.1

  beta: 0.0
  epsilon: 0.2

  temperature: 1.0
  top_p: 0.95

  bf16: true
  gradient_checkpointing: true
  seed: 42

  logging_steps: 5
  eval_strategy: steps
  eval_steps: 100
  save_strategy: steps
  save_steps: 10
  save_total_limit: 20

output_dir: checkpoints/qwen3.5-4b-encoder-phase2-grpo

wandb:
  enabled: false
  project: chess-tutor-grpo
  name: qwen3.5-4b-encoder-phase2-grpo
  tags:
    - grpo
    - encoder
    - phase2
