# Puzzle GRPO — Phase 2 RL (TRL GRPOTrainer + SGLang rollout)
# CNN board encoder frozen; LoRA on Qwen3.5-4B trainable.
# Rollouts generated by SGLang on GPU 1; training on GPU 0.
# Reward: did the model find the correct Lichess puzzle move?

model:
  model_name: "Qwen/Qwen3.5-4B"
  # Merged board reading SFT weights
  merged_weights: /tmp/chess-merged-board-reading/model.safetensors
  attn_implementation: "sdpa"
  torch_dtype: bfloat16

encoder:
  hidden_size: 256
  num_blocks: 10
  in_channels: 19
  pretrained_weights: /tmp/chess-merged-board-reading/encoder_weights.pt

lora:
  r: 64
  alpha: 128
  dropout: 0.0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: none

training:
  train_file: data/processed/puzzle_grpo/train.jsonl
  eval_file:  data/processed/puzzle_grpo/eval.jsonl

  sglang_url: http://localhost:8300
  sync_every_n_steps: 10        # sync LoRA weights to SGLang every N optimizer steps

  num_generations: 8
  max_prompt_length: 256
  max_completion_length: 4096

  # TRL constraint: per_device x world_size x grad_accum divisible by num_generations
  # 1 x 1 x 16 = 16, 16 % 8 == 0
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8    # effective batch = 8
  dataloader_num_workers: 2
 
  learning_rate: 5.0e-5
  lr_scheduler_type: cosine
  warmup_steps: 0
  max_steps: 5000
  optim: adamw_torch
  weight_decay: 0.01
  max_grad_norm: 0.1

  beta: 0.0             # no KL penalty → no reference model copy (saves ~4GB GPU memory)
  epsilon: 0.2

  temperature: 0.8

  bf16: true
  gradient_checkpointing: true
  seed: 42

  logging_steps: 5
  eval_strategy: "no"
  save_strategy: steps
  save_steps: 250
  save_total_limit: 20

output_dir: checkpoints/qwen3.5-4b-encoder-phase2-puzzle-grpo

wandb:
  enabled: false
  project: chess-tutor-grpo
  name: qwen3.5-4b-encoder-phase2-puzzle-grpo
  tags:
    - grpo
    - encoder
    - puzzle
    - phase2-rl
