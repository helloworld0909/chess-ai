# Qwen3.5-4B Encoder Phase 1 SFT — Board-reading grounding
# Qwen3.5-4B + pretrained ChessEncoder (72M params) + LoRA
# Task: model sees one sentinel token (CNN board embedding) + board-reading question;
# outputs <answer>X</answer> directly (no thinking). Goal: teach LLM to decode encoder embeddings.
# Dataset: sft_phase1_board_reading (~100k samples, 6 tasks, no "none" for in_check/attacked_by)
# DDP: 2× RTX 5090  |  effective batch = 32 (1 × 2 GPUs × 16)

model:
  model_name: "Qwen/Qwen3.5-4B"
  quantization: "none"
  attn_implementation: "sdpa"
  torch_dtype: bfloat16

encoder:
  in_channels: 19       # single board tensor (piece planes + castling + ep + move#)
  hidden_size: 256      # must match pretrain config
  num_blocks: 10        # must match pretrain config
  pretrained_weights: "checkpoints/encoder-pretrain/checkpoint-310000/encoder_weights.pt"

lora:
  r: 64
  alpha: 128
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: none
  task_type: CAUSAL_LM

training:
  train_file: data/processed/sft_phase1_board_reading.jsonl
  eval_file:  data/processed/sft_phase1_board_reading_eval.jsonl
  max_seq_length: 512    # short outputs: sentinel + question + <answer>X</answer>
  keep_think: false      # no thinking — pure grounding SFT
  packing: false

  per_device_train_batch_size: 4
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 4   # effective batch = 32 (4 × 2 GPUs × 4)

  learning_rate: 1.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  num_train_epochs: 1

  optim: adamw_8bit
  weight_decay: 0.01
  max_grad_norm: 1.0

  gradient_checkpointing: true
  bf16: true
  dataloader_num_workers: 4
  ddp_find_unused_parameters: false
  use_liger_kernel: false   # ChessLMWithEncoder is not a PreTrainedModel

  logging_steps: 10
  eval_strategy: steps
  eval_steps: 100
  save_strategy: steps
  save_steps: 100
  save_total_limit: 5

  seed: 42

output_dir: checkpoints/qwen3.5-4b-encoder-phase1-sft

wandb:
  enabled: false
  project: "chess-tutor"
  name: "qwen3.5-4b-encoder-phase1-sft"
  tags: ["encoder-sft", "phase1-sft", "board-reading"]
